<!-- Sidebar Navigation -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <i class="bi bi-truck sidebar-brand-icon"></i>
            <span class="sidebar-brand-text">TransitOps</span>
        </div>
        <button class="btn btn-link sidebar-close d-lg-none" id="sidebarClose">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <div class="sidebar-nav">
        <ul class="nav flex-column">
            {% for item in nav_items %}
            <li class="nav-item">
                <a class="nav-link {% if request.path == item.url or request.path|slice:'1:' == item.id|add:'/' %}active{% endif %}"
                   href="{{ item.url }}">
                    <i class="bi {{ item.icon }} nav-icon"></i>
                    <span class="nav-text">{{ item.name }}</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-user-avatar">
                <i class="bi bi-person-circle"></i>
            </div>
            <div class="sidebar-user-info">
                <span class="sidebar-user-name">{{ user.get_full_name|default:user.username }}</span>
                <span class="sidebar-user-role">
                    {% if user.is_superuser %}Admin{% elif user.profile.get_role_display %}{{ user.profile.get_role_display }}{% else %}User{% endif %}
                </span>
            </div>
        </div>
    </div>
</nav>

<!-- Sidebar Overlay for Mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

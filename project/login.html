<!DOCTYPE html>
<!--
  =============================================================
  FILE: login.html
  PURPOSE: Login page for TransitOps – Smart Transport
           Operations Platform. Provides a professional,
           responsive login form with email/password
           authentication, show/hide password toggle,
           remember‑me, forgot‑password link, loading
           spinner, and contextual error/success messages.
  =============================================================
-->
<html lang="en">

<head>
  <!-- ======================================================
       META TAGS – Character set, viewport for responsiveness,
       SEO description, and page title.
       ====================================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="TransitOps – Smart Transport Operations Platform. Securely log in to manage fleet, dispatch, and safety operations." />
  <title>TransitOps – Login</title>

  <!-- ======================================================
       GOOGLE FONTS – "Inter" for body text and "Outfit" for
       headings, giving a modern, clean typographic feel.
       ====================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- ======================================================
       STYLESHEET – External CSS for all visual styling.
       ====================================================== -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- ======================================================
       ANIMATED BACKGROUND SHAPES – Decorative floating
       circles that add depth and visual interest to the
       gradient background.
       ====================================================== -->
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape--1"></span>
    <span class="shape shape--2"></span>
    <span class="shape shape--3"></span>
    <span class="shape shape--4"></span>
    <span class="shape shape--5"></span>
  </div>

  <!-- ======================================================
       MAIN CONTAINER – Centres the login card vertically
       and horizontally using Flexbox.
       ====================================================== -->
  <main class="login-container" id="loginContainer">

    <!-- ====================================================
         LOGIN CARD – The white elevated card that houses
         all login UI elements.
         ==================================================== -->
    <section class="login-card" id="loginCard">

      <!-- ==================================================
           HEADER – Company logo, project title, and a
           friendly welcome message.
           ================================================== -->
      <header class="login-header">
        <!-- Company Logo -->
        <div class="logo-wrapper" id="logoWrapper">
          <img src="images/logo.png" alt="TransitOps Logo" class="logo" id="companyLogo" width="72" height="72" />
        </div>

        <!-- Project Title -->
        <h1 class="project-title" id="projectTitle">TransitOps</h1>

        <!-- Welcome Message -->
        <p class="welcome-msg" id="welcomeMsg">Welcome back! Sign in to continue.</p>
      </header>

      <!-- ==================================================
           MESSAGE AREA – Dynamically shows error (red) or
           success (green) feedback to the user.
           ================================================== -->
      <div class="message-area" id="messageArea" role="alert" aria-live="polite"></div>

      <!-- ==================================================
           LOGIN FORM – Email, password, remember‑me, forgot
           password, and the login button.
           ================================================== -->
      <form class="login-form" id="loginForm" novalidate autocomplete="off">

        <!-- ================================================
             EMAIL FIELD – Labelled input with an envelope
             icon rendered via CSS pseudo‑element.
             ================================================ -->
        <div class="form-group" id="emailGroup">
          <label for="emailInput" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <!-- Envelope SVG icon -->
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
            </span>
            <input type="email" id="emailInput" class="form-input" placeholder="you@transitops.com"
              aria-required="true" />
          </div>
        </div>

        <!-- ================================================
             PASSWORD FIELD – Labelled input with a lock icon
             and a show/hide toggle button.
             ================================================ -->
        <div class="form-group" id="passwordGroup">
          <label for="passwordInput" class="form-label">Password</label>
          <div class="input-wrapper">
            <!-- Lock SVG icon -->
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </span>
            <input type="password" id="passwordInput" class="form-input" placeholder="Enter your password"
              aria-required="true" />

            <!-- Show / Hide Password Toggle Button -->
            <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Show password"
              title="Show / Hide Password">
              <!-- Eye icon (visible when password is hidden) -->
              <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <!-- Eye‑off icon (visible when password is shown) -->
              <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" style="display:none">
                <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
                <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
                <path d="m2 2 20 20" />
              </svg>
            </button>
          </div>
        </div>

        <!-- ================================================
             OPTIONS ROW – Remember‑me checkbox and the
             Forgot Password link sit side by side.
             ================================================ -->
        <div class="form-options" id="formOptions">
          <!-- Remember Me Checkbox -->
          <label class="remember-me" id="rememberMeLabel">
            <input type="checkbox" id="rememberMeCheckbox" />
            <span class="checkmark"></span>
            Remember me
          </label>

          <!-- Forgot Password Link (dummy) -->
          <a href="#" class="forgot-password" id="forgotPasswordLink" onclick="event.preventDefault();">Forgot
            Password?</a>
        </div>

        <!-- ================================================
             LOGIN BUTTON – Contains text and a loading
             spinner that becomes visible during auth.
             ================================================ -->
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text" id="btnText">Sign In</span>
          <!-- Loading Spinner (hidden by default) -->
          <span class="spinner" id="loadingSpinner" aria-hidden="true"></span>
        </button>
      </form>

      <!-- ==================================================
           FOOTER – Copyright and branding text at the
           bottom of the card.
           ================================================== -->
      <footer class="login-footer" id="loginFooter">
        <p>&copy; 2026 TransitOps &mdash; Smart Transport Operations Platform</p>
      </footer>

    </section><!-- /.login-card -->

  </main><!-- /.login-container -->

  <!-- ======================================================
       JAVASCRIPT – Authentication and validation logic.
       ====================================================== -->
  <script src="js/auth.js"></script>
</body>

</html>
